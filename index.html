<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BJJ Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/css/themes.css">
  <link rel="stylesheet" href="./src/css/custom.css">
  <link rel="stylesheet" href="./src/css/modal.css">
</head>
<body>

<main class="scoreboard">

  <!-- Column headers -->
  <div class="col-headers">
    <div class="name-col"></div>
    <div class="score-header pts-header">PTS</div>
    <div class="score-header adv-header">ADV</div>
    <div class="score-header pen-header">PEN</div>
  </div>

  <!-- Player 1 row -->
  <div class="player-row">
    <div class="player-info">
      <span class="player-name" data-player-name="player1">ATLETA 1</span>
      <span class="player-team">EQUIPE</span>
    </div>
    <div class="score-cell pts">
      <button class="cell-btn inc" data-player="player1" data-action="normalIncrement">+</button>
      <span class="cell-val" data-point-total="player1">0</span>
      <button class="cell-btn dec" data-player="player1" data-action="normalDecrement">−</button>
    </div>
    <div class="score-cell adv">
      <button class="cell-btn inc" data-player="player1" data-action="advantageIncrement">+</button>
      <span class="cell-val" data-point-advantage="player1">0</span>
      <button class="cell-btn dec" data-player="player1" data-action="advantageDecrement">−</button>
    </div>
    <div class="score-cell pen">
      <button class="cell-btn inc" data-player="player1" data-action="punishmentIncrement">+</button>
      <span class="cell-val" data-point-punishment="player1">0</span>
      <button class="cell-btn dec" data-player="player1" data-action="punishmentDecrement">−</button>
    </div>
  </div>

  <!-- Player 2 row -->
  <div class="player-row">
    <div class="player-info">
      <span class="player-name" data-player-name="player2">ATLETA 2</span>
      <span class="player-team">EQUIPE</span>
    </div>
    <div class="score-cell pts">
      <button class="cell-btn inc" data-player="player2" data-action="normalIncrement">+</button>
      <span class="cell-val" data-point-total="player2">0</span>
      <button class="cell-btn dec" data-player="player2" data-action="normalDecrement">−</button>
    </div>
    <div class="score-cell adv">
      <button class="cell-btn inc" data-player="player2" data-action="advantageIncrement">+</button>
      <span class="cell-val" data-point-advantage="player2">0</span>
      <button class="cell-btn dec" data-player="player2" data-action="advantageDecrement">−</button>
    </div>
    <div class="score-cell pen">
      <button class="cell-btn inc" data-player="player2" data-action="punishmentIncrement">+</button>
      <span class="cell-val" data-point-punishment="player2">0</span>
      <button class="cell-btn dec" data-player="player2" data-action="punishmentDecrement">−</button>
    </div>
  </div>

  <!-- Timer row -->
  <div class="timer-row">
    <div class="timer-cell">
      <span class="timer-display" data-show-timer>0:00</span>
    </div>
    <div class="match-info">
      <div class="match-controls">
        <button class="btn-ctrl" data-timer-start>Iniciar</button>
        <button class="btn-ctrl secondary" data-game-reset>Reiniciar</button>
      </div>
    </div>
    <button class="btn-config" id="myBtn" title="Configurar">
      <img src="./src/images/config.png" alt="config">
    </button>
  </div>

</main>

<!-- Config modal -->
<div id="myModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2>Configurar Luta</h2>
    <form class="form-submit">
      <div class="form-input">
        <label for="player1-name">Atleta 1</label>
        <input type="text" name="player1" id="player1-name" placeholder="Nome do atleta" autocomplete="off">
      </div>
      <div class="form-input">
        <label for="player1-team">Equipe do Atleta 1</label>
        <input type="text" name="team1" id="player1-team" placeholder="Nome da equipe" autocomplete="off">
      </div>
      <div class="form-input">
        <label for="player2-name">Atleta 2</label>
        <input type="text" name="player2" id="player2-name" placeholder="Nome do atleta" autocomplete="off">
      </div>
      <div class="form-input">
        <label for="player2-team">Equipe do Atleta 2</label>
        <input type="text" name="team2" id="player2-team" placeholder="Nome da equipe" autocomplete="off">
      </div>
      <div class="form-input">
        <label for="timer">Tempo: <span class="timer-preview"></span></label>
        <input type="range" id="timer" name="timer" min="0" max="10">
      </div>
      <button type="submit" class="btn-submit">Configurar</button>
    </form>
  </div>
</div>

<!-- Victory overlay -->
<div id="victory-overlay" class="victory-overlay" hidden>
  <div class="victory-card">
    <p class="victory-headline" id="victory-headline">VITÓRIA</p>
    <p class="victory-name" id="victory-name">—</p>
    <p class="victory-reason" id="victory-reason"></p>
    <button class="btn-ctrl" id="btn-nova-luta">Nova Luta</button>
  </div>
</div>

<audio data-countdown-sound>
  <source src="./src/audio/323129-Crowd_chants_a_countdown--three-two-one-.mp3" type="audio/mp3">
  <source src="./src/audio/mixkit-short-race-countdown-926.wav" type="audio/wav">
</audio>

<script src="./src/js/player.js"></script>
<script src="./src/js/timer.js"></script>
<script src="./src/js/game.js"></script>
<script src="./src/js/modal.js"></script>
<script src="./src/js/form-submit.js"></script>
<script src="./src/js/refresh-page.js"></script>
</body>
</html>
